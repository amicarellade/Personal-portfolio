<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/styles.css" />
    <link rel="stylesheet" href="src/styles/library.css" />
    <title>Dante Amicarella - Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
    <header>
        <div class="container">
            <a href="index.html"><img src="images/logo.png" alt="logo" class="logo"></a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="mailto:dante.amicarella@gmail.com" class="Contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container library-page">
        <h1>My Reading Library</h1>

        <!-- Reading Stats Dashboard -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-number" id="totalBooks">—</div>
                <div class="stat-label">Books Read</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="currentlyReading">—</div>
                <div class="stat-label">Currently Reading</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgRating">—</div>
                <div class="stat-label">Avg Rating</div>
            </div>
        </section>

        <!-- Genre Distribution Chart -->
        <section class="chart-section">
            <h2>Reading by Genre</h2>
            <div id="genreChart"></div>
        </section>

        <!-- Filter Buttons -->
        <section class="filter-section">
            <h2>Browse Books</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Books</button>
                <button class="filter-btn" data-filter="currently-reading">Currently Reading</button>
                <button class="filter-btn" data-filter="fiction">Fiction</button>
                <button class="filter-btn" data-filter="non-fiction">Non-Fiction</button>
                <button class="filter-btn" data-filter="data-science">Data Science</button>
                <button class="filter-btn" data-filter="sports">Sports</button>
            </div>
        </section>

        <!-- Currently Reading -->
        <section class="currently-reading-section">
            <h2>Currently Reading</h2>
            <div class="book-grid" id="currentlyReadingGrid">
                <p class="loading-msg">Loading...</p>
            </div>
        </section>

        <!-- Completed Books -->
        <section class="completed-books-section">
            <h2>Books I've Read</h2>
            <div class="book-grid" id="bookGrid">
                <p class="loading-msg">Loading...</p>
            </div>
        </section>
    </div>

    <footer class="social-icons">
        <a href="https://twitter.com/datamicarella" target="_blank">
            <img src="images/twitter-icon.png" alt="Twitter" />
        </a>
        <a href="https://www.instagram.com/danteamicarella/" target="_blank">
            <img src="images/instagram-icon.png" alt="Instagram" />
        </a>
        <a href="https://github.com/amicarellade" target="_blank">
            <img src="images/github-icon.png" alt="GitHub" />
        </a>
        <a href="https://www.linkedin.com/in/dante-amicarella/" target="_blank">
            <img src="images/linkedin-icon.png" alt="LinkedIn" />
        </a>
    </footer>

    <script>
        const SUPABASE_URL = 'https://kyxrzabpxzanarfllgun.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5eHJ6YWJweHphbmFyZmxsZ3VuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTMwNTEsImV4cCI6MjA5MjI2OTA1MX0.47XXlYUtxKv9-ktfWb7n9fh2DMxnIoB935f3qLuWc1k';

        const CACHE_KEY = 'library_books';
        const CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24 hours

        async function fetchBooks() {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                const { ts, data } = JSON.parse(cached);
                if (Date.now() - ts < CACHE_TTL_MS) return data;
            }

            const res = await fetch(
                `${SUPABASE_URL}/rest/v1/books?select=*&order=title.asc`,
                {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                }
            );
            if (!res.ok) throw new Error('Failed to fetch books');
            const data = await res.json();
            localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
            return data;
        }

        function starsHtml(rating) {
            if (!rating) return '';
            const full = Math.round(rating);
            return '★'.repeat(full) + '☆'.repeat(5 - full);
        }

        function categoryLabel(cat) {
            return {
                'fiction': 'Fiction',
                'non-fiction': 'Non-Fiction',
                'data-science': 'Data Science',
                'sports': 'Sports'
            }[cat] || cat;
        }

        function bookCardHtml(book, featured = false) {
            const categories = book.status === 'currently-reading'
                ? `currently-reading ${book.category}`
                : book.category;

            return `
                <div class="book-card ${featured ? 'featured' : ''}" data-category="${categories}">
                    <div class="book-cover">
                        <img src="${book.cover_url || ''}" alt="${book.title} cover" loading="lazy">
                    </div>
                    <div class="book-info">
                        <h3>${book.title}</h3>
                        <p class="author">${book.author}</p>
                        ${book.status === 'currently-reading'
                            ? `<div class="book-meta">
                                <span class="category-tag ${book.category}">${categoryLabel(book.category)}</span>
                                <span class="reading-status">📖 In Progress</span>
                               </div>`
                            : `<div class="rating">${starsHtml(book.rating)}</div>
                               <span class="category-tag ${book.category}">${categoryLabel(book.category)}</span>`
                        }
                    </div>
                </div>`;
        }

        function renderStats(books) {
            const read = books.filter(b => b.status === 'read');
            const current = books.filter(b => b.status === 'currently-reading');
            const ratings = read.filter(b => b.rating).map(b => b.rating);
            const avg = ratings.length
                ? (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1)
                : '—';

            document.getElementById('totalBooks').textContent = read.length;
            document.getElementById('currentlyReading').textContent = current.length;
            document.getElementById('avgRating').textContent = avg;
        }

        function renderGenreChart(books) {
            const read = books.filter(b => b.status === 'read');
            const counts = {};
            read.forEach(b => { counts[b.category] = (counts[b.category] || 0) + 1; });

            const genreData = [
                { genre: 'Fiction',      key: 'fiction' },
                { genre: 'Non-Fiction',  key: 'non-fiction' },
                { genre: 'Data Science', key: 'data-science' },
                { genre: 'Sports',       key: 'sports' },
            ].map(d => ({ genre: d.genre, count: counts[d.key] || 0 }))
             .filter(d => d.count > 0);

            const width = Math.min(500, window.innerWidth - 48);
            const height = 300;
            const margin = { top: 20, right: 20, bottom: 60, left: 40 };

            const svg = d3.select('#genreChart')
                .append('svg')
                .attr('width', width)
                .attr('height', height + 20)
                .style('overflow', 'visible');

            const x = d3.scaleBand()
                .domain(genreData.map(d => d.genre))
                .range([margin.left, width - margin.right])
                .padding(0.2);

            const y = d3.scaleLinear()
                .domain([0, d3.max(genreData, d => d.count)])
                .nice()
                .range([height - margin.bottom, margin.top]);

            const colors = ['#667eea', '#f093fb', '#84fab0', '#ffecd2'];

            svg.selectAll('rect')
                .data(genreData)
                .join('rect')
                .attr('x', d => x(d.genre))
                .attr('y', d => y(d.count))
                .attr('width', x.bandwidth())
                .attr('height', d => y(0) - y(d.count))
                .attr('fill', (d, i) => colors[i])
                .attr('rx', 5);

            svg.selectAll('text.label')
                .data(genreData)
                .join('text')
                .attr('class', 'label')
                .attr('x', d => x(d.genre) + x.bandwidth() / 2)
                .attr('y', d => y(d.count) - 5)
                .attr('text-anchor', 'middle')
                .text(d => d.count)
                .style('font-size', '14px')
                .style('font-weight', 'bold')
                .style('fill', '#333');

            svg.append('g')
                .attr('transform', `translate(0,${height - margin.bottom})`)
                .call(d3.axisBottom(x))
                .style('font-size', '12px');

            svg.append('g')
                .attr('transform', `translate(${margin.left},0)`)
                .call(d3.axisLeft(y).ticks(5))
                .style('font-size', '12px');
        }

        function renderBooks(books) {
            const current = books.filter(b => b.status === 'currently-reading');
            const read = books.filter(b => b.status === 'read');

            document.getElementById('currentlyReadingGrid').innerHTML =
                current.length
                    ? current.map(b => bookCardHtml(b, true)).join('')
                    : '<p>Nothing in progress right now.</p>';

            document.getElementById('bookGrid').innerHTML =
                read.map(b => bookCardHtml(b)).join('');

            // Wire up filter buttons
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    const filter = button.dataset.filter;

                    document.querySelectorAll('.book-card').forEach(card => {
                        if (filter === 'all') {
                            card.style.display = 'block';
                        } else {
                            const cats = card.dataset.category.split(' ');
                            card.style.display = cats.includes(filter) ? 'block' : 'none';
                        }
                    });
                });
            });
        }

        async function init() {
            try {
                const books = await fetchBooks();
                renderStats(books);
                renderGenreChart(books);
                renderBooks(books);
            } catch (e) {
                document.getElementById('bookGrid').innerHTML =
                    '<p style="color:#cc5500;font-family:\'Space Mono\',monospace">Could not load library. Try again later.</p>';
                document.getElementById('currentlyReadingGrid').innerHTML = '';
            }
        }

        init();
    </script>
</body>

</html>
